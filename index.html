<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寂静协议 原型版</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>寂静协议 // 原型版</h1>
        <div id="run-info" class="run-info">当前无进行中的行动</div>
      </header>

      <main id="screen-root" class="screen-root" aria-live="polite"></main>

      <aside class="log-panel compact-log-panel">
        <details id="log-panel-details" class="log-panel-details">
          <summary>行动记录</summary>
          <ul id="log-list"></ul>
        </details>
      </aside>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
